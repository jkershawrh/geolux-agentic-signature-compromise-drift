repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--select, "E,F,I", --fix]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: .venv/bin/python -m pytest tests/ --ignore=tests/bdd -q --tb=line
        language: system
        pass_filenames: false
        always_run: true

      - id: behave
        name: behave
        entry: .venv/bin/python -m behave tests/bdd/features/ --no-capture
        language: system
        pass_filenames: false
        always_run: true
